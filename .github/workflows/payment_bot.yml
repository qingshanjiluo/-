name: 支付机器人

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-payments:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖（Playwright 所需）
        run: |
          sudo apt-get update
          # 修正包名：libasound2 → libasound2t64（Ubuntu 24.04 兼容）
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 libasound2t64 libgbm1

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: |
          playwright install chromium

      - name: 运行支付机器人
        env:
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_USERNAME: ${{ secrets.DEEPSEEK_USERNAME }}
          DEEPSEEK_PASSWORD: ${{ secrets.DEEPSEEK_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          LISTEN_CATEGORIES: ${{ secrets.LISTEN_CATEGORIES }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          python payment_bot.py --once

      - name: 提交已处理记录
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_requests.json
          git diff --quiet && git diff --staged --quiet || git commit -m "更新支付请求处理记录"
          git push
