name: 自动顶帖机器人

on:
  schedule:
    # 每天 6:00, 12:00, 21:00 (北京时间)
    - cron: '0 22,4,13 * * *'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  run-bump:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖（验证码识别所需）
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt

      - name: 运行顶帖机器人
        env:
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          BUMP_INTERVAL: ${{ secrets.BUMP_INTERVAL }}
          DELETE_DELAY: ${{ secrets.DELETE_DELAY }}
          BUMP_ROUNDS: ${{ secrets.BUMP_ROUNDS }}
        run: |
          python auto_bump.py

      - name: 提交状态文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bump_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "更新顶帖状态"
          git push
